<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Green Archers Analytics - Statistics Encoding</title>

<link rel="stylesheet" href="../css/statistics-encoding.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:400px;
border-radius:8px;
}

.close-btn{
float:right;
cursor:pointer;
font-size:20px;
}
</style>

</head>

<body>

<header class="topbar">
<div class="logo">
<i class="fa-solid fa-basketball"></i> Green Archers Analytics
</div>
<div class="header-right">
<i class="fa-solid fa-user"></i> Logout
</div>
</header>


<div class="layout">

<aside class="sidebar">
<ul>
<li><a href="admin-dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
<li><a href="player-admin.html"><i class="fa-solid fa-users"></i> Players</a></li>
<li><a href="admin-games.html"><i class="fa-solid fa-calendar"></i> Games</a></li>
<li><a href="statistics-encoding.html"><i class="fa-solid fa-chart-column"></i> Statistics</a></li>
<li><a href="reports-admin.html"><i class="fa-solid fa-file"></i> Reports</a></li>
</ul>
</aside>


<main class="main">

<h2>Statistics Encoding</h2>

<section class="controls-section">

<label>Select Game</label>

<select id="gameSelect">
<option value="">Choose a game...</option>
</select>

<button id="addStatsBtn" disabled>
<i class="fa-solid fa-plus"></i> Add Player Stats
</button>

</section>


<div class="table-container">

<table class="stats-table">

<thead>
<tr>
<th>PLAYER ID</th>
<th>MIN</th>
<th>PTS</th>
<th>AST</th>
<th>OREB</th>
<th>DREB</th>
<th>STL</th>
<th>BLK</th>
<th>TO</th>
<th>PF</th>
<th>+/-</th>
</tr>
</thead>

<tbody id="statsTableBody">

<tr>
<td colspan="11" style="text-align:center">
Select a game to view statistics
</td>
</tr>

</tbody>

</table>

</div>

</main>
</div>


<!-- MODAL -->
<div id="statsModal" class="modal">

<div class="modal-content">

<span class="close-btn" id="closeModal">&times;</span>

<h3>Add Player Stats</h3>

<form id="statsForm">

<input type="hidden" id="gameId">

<label>Player ID</label>
<input type="text" id="playerId" required>

<label>Minutes Played</label>
<input type="number" id="minutesPlayed" value="0">

<label>Points</label>
<input type="number" id="points" value="0">

<label>Assists</label>
<input type="number" id="assists" value="0">

<label>Offensive Rebounds</label>
<input type="number" id="offensiveRebounds" value="0">

<label>Defensive Rebounds</label>
<input type="number" id="defensiveRebounds" value="0">

<label>Steals</label>
<input type="number" id="steals" value="0">

<label>Blocks</label>
<input type="number" id="blocks" value="0">

<label>Turnovers</label>
<input type="number" id="turnovers" value="0">

<label>Fouls</label>
<input type="number" id="fouls" value="0">

<label>Plus Minus</label>
<input type="number" id="plusMinus" value="0">

<button type="submit">Save Stats</button>

</form>

</div>

</div>


<script src="../js/statistics-encoding.js"></script>

</body>
</html>
