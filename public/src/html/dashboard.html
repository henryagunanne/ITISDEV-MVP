<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Green Archers Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard">
        <i class="fas fa-basketball-ball me-2"></i>Green Archers Analytics
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="nav-link" id="userDisplay"><i class="fas fa-user me-1"></i></span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-1"></i>Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 sidebar d-none d-md-block">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="../html/dashboard.html"><i class="fas fa-tachometer-alt"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="../html/players.html"><i class="fas fa-users"></i>Players</a></li>
          <li class="nav-item"><a class="nav-link" href="../html/games.html"><i class="fas fa-calendar-alt"></i>Games</a></li>
          <li class="nav-item"><a class="nav-link" href="../html/stats.html"><i class="fas fa-chart-bar"></i>Statistics</a></li>
          <li class="nav-item"><a class="nav-link active" href="../html/reports.html"><i class="fas fa-file-alt"></i>Reports</a></li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 ms-auto px-4 py-4">
        <div class="section-header">
          <h4><i class="fas fa-tachometer-alt me-2"></i>Dashboard</h4>
          <select id="seasonFilter" class="form-select" style="width:auto;">
            <option value="">All Seasons</option>
            <option value="UAAP Season 87">UAAP Season 87</option>
            <option value="UAAP Season 86">UAAP Season 86</option>
          </select>
        </div>

        <!-- Stat Cards -->
        <div class="row g-4 mb-4">
          <div class="col-md-3">
            <div class="card stat-card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <div class="stat-label">Games Played</div>
                  <div class="stat-value" id="totalGames">0</div>
                </div>
                <i class="fas fa-basketball-ball stat-icon"></i>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <div class="stat-label">Avg Points</div>
                  <div class="stat-value" id="avgPoints">0</div>
                </div>
                <i class="fas fa-bullseye stat-icon"></i>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <div class="stat-label">Avg Rebounds</div>
                  <div class="stat-value" id="avgRebounds">0</div>
                </div>
                <i class="fas fa-arrows-alt stat-icon"></i>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <div class="stat-label">Record (W-L)</div>
                  <div class="stat-value" id="record">0-0</div>
                </div>
                <i class="fas fa-trophy stat-icon"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4 mb-4">
          <div class="col-md-8">
            <div class="chart-container">
              <h5><i class="fas fa-chart-line me-2"></i>Team Scoring by Game</h5>
              <canvas id="scoringChart" height="250"></canvas>
            </div>
          </div>
          <div class="col-md-4">
            <div class="chart-container">
              <h5><i class="fas fa-chart-pie me-2"></i>Win/Loss Record</h5>
              <canvas id="recordChart" height="250"></canvas>
            </div>
          </div>
        </div>

        <!-- Leaders -->
        <div class="row g-4">
          <div class="col-md-4">
            <div class="chart-container">
              <h5><i class="fas fa-star me-2"></i>Top Scorers (PPG)</h5>
              <div id="topScorers"></div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="chart-container">
              <h5><i class="fas fa-hand-rock me-2"></i>Top Rebounders (RPG)</h5>
              <div id="topRebounders"></div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="chart-container">
              <h5><i class="fas fa-hands-helping me-2"></i>Top Assists (APG)</h5>
              <div id="topAssists"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let scoringChart, recordChart;

    $(function () {
      loadCurrentUser();
      loadDashboard();

      $('#seasonFilter').on('change', loadDashboard);
      $('#logoutBtn').on('click', function (e) {
        e.preventDefault();
        API.post('/logout').always(() => window.location.href = '/login');
      });
    });

    function loadCurrentUser() {
      API.get('/auth/me').done(function (user) {
        $('#userDisplay').html(`<i class="fas fa-user me-1"></i>${user.firstName} ${user.lastName} (${user.role})`);
      });
    }

    function loadDashboard() {
      const season = $('#seasonFilter').val();
      const qs = season ? `?season=${encodeURIComponent(season)}` : '';

      // Load team analytics
      API.get('/analytics/team' + qs).done(function (data) {
        const ts = data.teamStats || {};
        $('#totalGames').text(data.gamesPlayed || 0);
        $('#avgPoints').text((ts.avgPoints || 0).toFixed(1));
        $('#avgRebounds').text((ts.avgRebounds || 0).toFixed(1));
        $('#record').text(`${data.record?.wins || 0}-${data.record?.losses || 0}`);
      });

      // Load season analytics for charts
      API.get('/analytics/season' + qs).done(function (data) {
        renderScoringChart(data.perGameScoring || []);
        renderRecordChart(data.record || { wins: 0, losses: 0 });
        renderLeaders('topScorers', data.leaders?.topScorers || [], 'ppg');
        renderLeaders('topRebounders', data.leaders?.topRebounders || [], 'rpg');
        renderLeaders('topAssists', data.leaders?.topAssists || [], 'apg');
      });
    }

    function renderScoringChart(games) {
      if (scoringChart) scoringChart.destroy();
      const ctx = document.getElementById('scoringChart').getContext('2d');
      scoringChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: games.map(g => g.opponent),
          datasets: [
            { label: 'Team Score', data: games.map(g => g.teamScore), backgroundColor: '#006F3C' },
            { label: 'Opponent Score', data: games.map(g => g.opponentScore), backgroundColor: '#DEE2E6' }
          ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
      });
    }

    function renderRecordChart(record) {
      if (recordChart) recordChart.destroy();
      const ctx = document.getElementById('recordChart').getContext('2d');
      recordChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Wins', 'Losses'],
          datasets: [{ data: [record.wins, record.losses], backgroundColor: ['#006F3C', '#dc3545'] }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
      });
    }

    function renderLeaders(containerId, leaders, statKey) {
      const html = leaders.map((l, i) => `
        <div class="leader-card">
          <div class="rank">${i + 1}</div>
          <div class="player-info">
            <div class="player-name">${l.player.firstName} ${l.player.lastName}</div>
          </div>
          <div class="player-stat">${l[statKey]}</div>
        </div>
      `).join('');
      $(`#${containerId}`).html(html || '<p class="text-muted">No data available</p>');
    }
  </script>
</body>
</html>
