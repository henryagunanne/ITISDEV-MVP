<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games - Green Archers Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard"><i class="fas fa-basketball-ball me-2"></i>Green Archers Analytics</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><span class="nav-link" id="userDisplay"></span></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-1"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 sidebar d-none d-md-block">
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="../html/dashboard.html"><i class="fas fa-tachometer-alt"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="../html/players.html"><i class="fas fa-users"></i>Players</a></li>
            <li class="nav-item"><a class="nav-link" href="../html/games.html"><i class="fas fa-calendar-alt"></i>Games</a></li>
            <li class="nav-item"><a class="nav-link" href="../html/stats.html"><i class="fas fa-chart-bar"></i>Statistics</a></li>
            <li class="nav-item"><a class="nav-link active" href="../html/reports.html"><i class="fas fa-file-alt"></i>Reports</a></li>
        </ul>
      </nav>

      <main class="col-md-10 ms-auto px-4 py-4">
        <div class="section-header">
          <h4><i class="fas fa-calendar-alt me-2"></i>Game Schedule</h4>
          <div class="d-flex gap-2">
            <select id="statusFilter" class="form-select" style="width:auto;">
              <option value="">All Status</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
            </select>
            <select id="typeFilter" class="form-select" style="width:auto;">
              <option value="">All Types</option>
              <option value="UAAP">UAAP</option>
              <option value="Preseason">Preseason</option>
              <option value="Tune-Up">Tune-Up</option>
            </select>
            <button class="btn btn-dlsu" id="addGameBtn" data-bs-toggle="modal" data-bs-target="#gameModal">
              <i class="fas fa-plus me-1"></i>Add Game
            </button>
          </div>
        </div>

        <div class="table-container">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Date</th>
                <th>Opponent</th>
                <th>Type</th>
                <th>Venue</th>
                <th>Season</th>
                <th>Score</th>
                <th>Result</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="gamesTableBody">
              <tr><td colspan="9" class="text-center py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <!-- Game Modal -->
  <div class="modal fade" id="gameModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="gameModalTitle">Add Game</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="gameForm">
          <div class="modal-body">
            <input type="hidden" id="gameId">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Game Date</label>
                <input type="date" class="form-control" id="gameDate" required>
              </div>
              <div class="col-6">
                <label class="form-label">Opponent</label>
                <input type="text" class="form-control" id="opponent" required placeholder="e.g. Ateneo Blue Eagles">
              </div>
              <div class="col-6">
                <label class="form-label">Game Type</label>
                <select class="form-select" id="gameTypeName" required>
                  <option value="">Select</option>
                  <option>UAAP</option>
                  <option>Preseason</option>
                  <option>Tune-Up</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Venue</label>
                <input type="text" class="form-control" id="venue" placeholder="e.g. MOA Arena">
              </div>
              <div class="col-6">
                <label class="form-label">Season</label>
                <input type="text" class="form-control" id="season" required placeholder="e.g. UAAP Season 87">
              </div>
              <div class="col-6">
                <label class="form-label">Status</label>
                <select class="form-select" id="gameStatus">
                  <option>Scheduled</option>
                  <option>Completed</option>
                </select>
              </div>
              <div class="col-4">
                <label class="form-label">Team Score</label>
                <input type="number" class="form-control" id="teamScore" min="0" value="0">
              </div>
              <div class="col-4">
                <label class="form-label">Opponent Score</label>
                <input type="number" class="form-control" id="opponentScore" min="0" value="0">
              </div>
              <div class="col-4">
                <label class="form-label">Result</label>
                <select class="form-select" id="result">
                  <option value="">TBD</option>
                  <option>Win</option>
                  <option>Loss</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-dlsu">Save Game</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    $(function () {
      loadGames();
      loadCurrentUser();

      $('#logoutBtn').on('click', function (e) { e.preventDefault(); API.post('/logout').always(() => window.location.href = '/login'); });
      $('#statusFilter, #typeFilter').on('change', loadGames);

      $('#gameForm').on('submit', function (e) {
        e.preventDefault();
        const id = $('#gameId').val();
        const data = {
          gameDate: $('#gameDate').val(),
          opponent: $('#opponent').val(),
          gameType: { name: $('#gameTypeName').val() },
          venue: $('#venue').val(),
          season: $('#season').val(),
          status: $('#gameStatus').val(),
          teamScore: parseInt($('#teamScore').val()) || 0,
          opponentScore: parseInt($('#opponentScore').val()) || 0,
          result: $('#result').val() || null
        };

        const promise = id ? API.put(`/games/${id}`, data) : API.post('/games', data);
        promise.done(function () {
          bootstrap.Modal.getInstance(document.getElementById('gameModal')).hide();
          showToast(id ? 'Game updated' : 'Game added');
          loadGames();
        }).fail(function (xhr) { showToast(xhr.responseJSON?.error || 'Error', 'error'); });
      });

      $('#gameModal').on('hidden.bs.modal', function () {
        $('#gameForm')[0].reset();
        $('#gameId').val('');
        $('#gameModalTitle').text('Add Game');
      });
    });

    function loadCurrentUser() {
      API.get('/auth/me').done(function (user) {
        $('#userDisplay').html(`<i class="fas fa-user me-1"></i>${user.firstName} ${user.lastName}`);
      });
    }

    function loadGames() {
      const status = $('#statusFilter').val();
      const type = $('#typeFilter').val();
      let url = '/games?';
      if (status) url += `status=${status}&`;
      if (type) url += `gameType=${type}`;

      API.get(url).done(function (games) {
        if (!games.length) {
          $('#gamesTableBody').html('<tr><td colspan="9" class="text-center py-4 text-muted">No games found</td></tr>');
          return;
        }
        const html = games.map(g => {
          const resultBadge = g.result === 'Win' ? 'badge-win' : g.result === 'Loss' ? 'badge-loss' : '';
          const statusBadge = g.status === 'Completed' ? 'badge-completed' : 'badge-scheduled';
          return `<tr>
            <td>${formatDate(g.gameDate)}</td>
            <td><strong>${g.opponent}</strong></td>
            <td>${g.gameType?.name || '—'}</td>
            <td>${g.venue || '—'}</td>
            <td>${g.season}</td>
            <td>${g.status === 'Completed' ? g.teamScore + ' - ' + g.opponentScore : '—'}</td>
            <td>${g.result ? '<span class="badge ' + resultBadge + '">' + g.result + '</span>' : '—'}</td>
            <td><span class="badge ${statusBadge}">${g.status}</span></td>
            <td>
              <button class="btn btn-sm btn-outline-dlsu me-1" onclick="editGame('${g._id}')"><i class="fas fa-edit"></i></button>
              <a class="btn btn-sm btn-outline-dlsu" href="/stats-page?gameId=${g._id}"><i class="fas fa-chart-bar"></i></a>
            </td>
          </tr>`;
        }).join('');
        $('#gamesTableBody').html(html);
      });
    }

    function editGame(id) {
      API.get(`/games/${id}`).done(function (g) {
        $('#gameId').val(g._id);
        $('#gameDate').val(g.gameDate?.substring(0, 10));
        $('#opponent').val(g.opponent);
        $('#gameTypeName').val(g.gameType?.name);
        $('#venue').val(g.venue);
        $('#season').val(g.season);
        $('#gameStatus').val(g.status);
        $('#teamScore').val(g.teamScore);
        $('#opponentScore').val(g.opponentScore);
        $('#result').val(g.result || '');
        $('#gameModalTitle').text('Edit Game');
        new bootstrap.Modal(document.getElementById('gameModal')).show();
      });
    }
  </script>
</body>
</html>
