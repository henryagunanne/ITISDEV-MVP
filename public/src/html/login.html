<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Green Archers Basketball Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="/src/css/auth.css" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card text-center">
      <div class="mb-3 align-items-center" id="logo">
        <img src="../../assets/images/logo/maxresdefault.jpg">
      </div>
      <h2>Green Archers</h2>
      <p class="subtitle">Basketball Analytics System</p>

      <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm" class="needs-validation" method="POST" novalidate>
        <div class="mb-3 text-start">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="username" name="username" required placeholder="Enter username" pattern="^[a-zA-Z0-9](?:[a-zA-Z0-9_]{1,18})[a-zA-Z0-9]$">
            <div class="invalid-feedback">Enter a valid username.</div>
          </div>
        </div>
        <div class="mb-4 text-start">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter password">
            <div class="invalid-feedback"></div>
          </div>
        </div>
        <button type="submit" class="btn btn-dlsu w-100 py-2">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>

      <p class="mt-4 text-muted" style="font-size:0.8rem;">
        DLSU Collegiate Basketball Statistics Platform
      </p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/src/javascript/auth.js"></script>
</body>
</html>
